name: build-push-deploy

on:
  push:
    tags:
      - 'rel-*'

jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      image_name: ${{ steps.vars.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "image_name=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }}" \
            -t "${{ steps.vars.outputs.image_name }}:latest" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }}"
          docker push "${{ steps.vars.outputs.image_name }}:latest"

  deploy:
    runs-on: [self-hosted, linux, x64]
    needs: build

    steps:
      - name: Deploy
        run: |
          cd /home/ant3k/mesh-view
          bash update.sh
